<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Illyasaka — Application Form</title>
  <style>
    :root {
      --bg: #0b0a10;
      --bg-soft: #14121d;
      --card: rgba(22, 18, 34, 0.88);
      --card-2: rgba(29, 22, 43, 0.92);
      --text: #f8f1ff;
      --muted: #b8abc7;
      --line: rgba(255, 255, 255, 0.08);
      --accent: #ff78c9;
      --accent-2: #ad7bff;
      --success: #8ef0c7;
      --danger: #ff9db0;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(173, 123, 255, 0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(255, 120, 201, 0.16), transparent 26%),
        linear-gradient(180deg, #08070d 0%, #0d0a14 42%, #0a0910 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.05;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(circle at center, black, transparent 80%);
    }

    .wrap {
      width: min(980px, calc(100% - 32px));
      margin: 40px auto 80px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(255,120,201,0.12), rgba(173,123,255,0.09)), var(--card);
      border: 1px solid var(--line);
      border-radius: 32px;
      box-shadow: var(--shadow);
      padding: 32px;
      display: block;
      backdrop-filter: blur(18px);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -10% -40% auto;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,120,201,.28), transparent 60%);
      filter: blur(40px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: #f7d8ee;
      font-size: 0.85rem;
      letter-spacing: .02em;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3.8rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
      max-width: 60ch;
    }

    

    .form-shell {
      margin-top: 26px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 32px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .form-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 22px 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.03), transparent);
    }

    .form-top h2 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: .01em;
    }

    .subtle {
      color: var(--muted);
      font-size: .92rem;
    }

    form {
      padding: 24px;
    }

    .question {
      background: var(--card-2);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      padding: 22px;
      margin-bottom: 18px;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .question:hover {
      transform: translateY(-1px);
      border-color: rgba(255,120,201,0.24);
      box-shadow: 0 16px 34px rgba(0,0,0,.18);
    }

    .question-title {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .question-title h3 {
      margin: 0;
      font-size: 1.02rem;
      font-weight: 700;
      letter-spacing: -.01em;
    }

    .required {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: .74rem;
      background: rgba(255, 120, 201, .13);
      border: 1px solid rgba(255, 120, 201, .24);
      color: #ffd5ec;
      white-space: nowrap;
    }

    .question-desc,
    .info-text {
      line-height: 1.65;
    }

    .info-text {
      font-size: 1.18rem;
      line-height: 1.8;
      font-weight: 800;
      color: var(--text);
      letter-spacing: .01em;
    }

    .field-short {
      min-height: auto;
      height: 52px;
      resize: none;
    }

    .content-image-block {
      margin-bottom: 18px;
      background: rgba(255,255,255,.025);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 22px;
      padding: 18px;
    }

    .content-image-title {
      margin: 0 0 12px;
      font-size: 1rem;
      font-weight: 700;
    }

    .content-image {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.08);
      object-fit: cover;
    }

    .content-image-caption {
      margin-top: 12px;
      color: var(--muted);
      font-size: .92rem;
      line-height: 1.6;
    }

    .info-block {
      background: rgba(255,255,255,.025);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 18px;
    }

    .question-image {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.08);
      margin-bottom: 14px;
      display: block;
    }

    input[type="text"],
    input[type="email"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.04);
      color: var(--text);
      border-radius: 16px;
      padding: 14px 16px;
      outline: none;
      font: inherit;
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }

    select {
      color-scheme: dark;
      background-color: #201a2d;
    }

    select option {
      background: #201a2d;
      color: #f8f1ff;
    }

    select option[value=""] {
      color: #b8abc7;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    input::placeholder,
    textarea::placeholder {
      color: #9d8fad;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(255,120,201,.45);
      box-shadow: 0 0 0 5px rgba(255,120,201,.09);
      background: rgba(255,255,255,.06);
    }

    .choices {
      display: grid;
      gap: 12px;
      margin-top: 8px;
    }

    .choice {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 15px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.025);
      cursor: pointer;
    }

    .choice:hover {
      border-color: rgba(173,123,255,.35);
      background: rgba(255,255,255,.04);
    }

    .choice input {
      margin-top: 3px;
      accent-color: var(--accent);
    }

    .choice span {
      color: var(--text);
      line-height: 1.55;
    }

    .consent-box {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.025);
    }

    .consent-box input {
      margin-top: 3px;
      accent-color: var(--accent);
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    .submit-btn {
      appearance: none;
      border: 0;
      border-radius: 18px;
      padding: 15px 22px;
      font: inherit;
      font-weight: 700;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 16px 35px rgba(173,123,255,.2);
      transition: transform .18s ease, filter .18s ease;
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }

    .submit-btn:disabled {
      opacity: .65;
      cursor: wait;
      transform: none;
    }

    .status {
      font-size: .94rem;
      color: var(--muted);
    }

    .status.success { color: var(--success); }
    .status.error { color: var(--danger); }

    .success-popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(7, 6, 12, 0.72);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }

    .success-popup-overlay.show {
      display: flex;
    }

    .success-popup {
      width: min(460px, 100%);
      background: linear-gradient(135deg, rgba(44, 28, 58, 0.98), rgba(75, 45, 95, 0.96));
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,.45);
      padding: 28px;
      text-align: center;
    }

    .success-popup h3 {
      margin: 0 0 10px;
      font-size: 1.5rem;
      line-height: 1.2;
    }

    .success-popup p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    code.inline {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      padding: 2px 8px;
      border-radius: 10px;
      color: #ffd7ef;
    }

    @media (max-width: 760px) {
      .hero {
        grid-template-columns: 1fr;
        padding: 24px;
      }

      .wrap {
        width: min(100% - 18px, 980px);
        margin-top: 18px;
      }

      .form-top,
      form,
      .footer-note {
        padding-left: 18px;
        padding-right: 18px;
      }

      .question,
      .info-block {
        padding: 18px;
      }
    }
  </style>
</head>

    const form = document.getElementById("dynamicForm");
    const titleEl = document.getElementById("formTitle");
    const subtitleEl = document.getElementById("formSubtitle");
    const countEl = document.getElementById("questionCount");

    titleEl.textContent = FORM_CONFIG.title;
    subtitleEl.textContent = FORM_CONFIG.subtitle;

    function escapeHtml(value = "") {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderQuestion(question) {
      const wrapper = document.createElement("section");
      wrapper.className = question.type === "textblock" ? "info-block" : "question";
      wrapper.dataset.type = question.type;

      if (question.type === "textblock") {
        wrapper.innerHTML = `<div class="info-text">${escapeHtml(question.text || "")}</div>`;
        return wrapper;
      }

      if (question.type === "displayImage") {
        wrapper.className = "content-image-block";
        wrapper.innerHTML = `
          ${question.label ? `<h3 class="content-image-title">${escapeHtml(question.label)}</h3>` : ""}
          ${question.imageUrl ? `<img class="content-image" src="${escapeHtml(question.imageUrl)}" alt="${escapeHtml(question.label || 'Displayed image')}" />` : ""}
          ${question.caption ? `<div class="content-image-caption">${escapeHtml(question.caption)}</div>` : ""}
        `;
        return wrapper;
      }

      const requiredBadge = question.required ? '<span class="required">Required</span>' : "";
      const desc = question.description ? `<div class="question-desc">${escapeHtml(question.description)}</div>` : "";
      const title = `
        <div class="question-title">
          <h3>${escapeHtml(question.label || "Untitled question")}</h3>
          ${requiredBadge}
        </div>
        ${desc}
      `;

      let fieldHtml = "";

      switch (question.type) {
        case "text":
        case "email":
        case "number":
          fieldHtml = `
            <input
              type="${question.type}"
              name="${escapeHtml(question.id)}"
              placeholder="${escapeHtml(question.placeholder || "")}" 
              ${question.required ? "required" : ""}
            />
          `;
          break;

        case "textline":
          fieldHtml = `
            <input
              type="text"
              name="${escapeHtml(question.id)}"
              placeholder="${escapeHtml(question.placeholder || "")}" 
              ${question.required ? "required" : ""}
            />
          `;
          break;

        case "textarea":
          fieldHtml = `
            <textarea
              class="${question.type === "textline" ? "field-short" : ""}"
              name="${escapeHtml(question.id)}"
              placeholder="${escapeHtml(question.placeholder || "")}" 
              ${question.required ? "required" : ""}
            ></textarea>
          `;
          break;

        case "textarea_unused_marker":
          fieldHtml = `
            <textarea
              name="${escapeHtml(question.id)}"
              placeholder="${escapeHtml(question.placeholder || "")}" 
              ${question.required ? "required" : ""}
            ></textarea>
          `;
          break;

        case "select":
          fieldHtml = `
            <select name="${escapeHtml(question.id)}" ${question.required ? "required" : ""}>
              ${(question.options || []).map((option, index) => `
                <option value="${index === 0 ? "" : escapeHtml(option)}">${escapeHtml(option)}</option>
              `).join("")}
            </select>
          `;
          break;

        case "radio":
          fieldHtml = `
            <div class="choices">
              ${(question.options || []).map((option, index) => `
                <label class="choice">
                  <input
                    type="radio"
                    name="${escapeHtml(question.id)}"
                    value="${escapeHtml(option)}"
                    ${question.required && index === 0 ? "required" : ""}
                  />
                  <span>${escapeHtml(option)}</span>
                </label>
              `).join("")}
            </div>
          `;
          break;

        case "checkbox":
          fieldHtml = `
            <div class="choices">
              ${(question.options || []).map(option => `
                <label class="choice">
                  <input
                    type="checkbox"
                    name="${escapeHtml(question.id)}"
                    value="${escapeHtml(option)}"
                  />
                  <span>${escapeHtml(option)}</span>
                </label>
              `).join("")}
            </div>
          `;
          break;

        case "image":
          fieldHtml = `
            ${question.imageUrl ? `<img class="question-image" src="${escapeHtml(question.imageUrl)}" alt="${escapeHtml(question.label || 'Question image')}" />` : ""}
          `;
          break;

        case "consent":
          fieldHtml = `
            <div class="question-desc">${escapeHtml(question.text || "")}</div>
            <label class="consent-box">
              <input type="checkbox" name="${escapeHtml(question.id)}" value="yes" ${question.required ? "required" : ""} />
              <span>I confirm and give my consent.</span>

          `;
          break;

        default:
          fieldHtml = `<div class="question-desc">Unsupported field type: ${escapeHtml(question.type)}</div>`;
      }

      wrapper.innerHTML = title + fieldHtml;
      return wrapper;
    }

    function renderForm() {
      form.innerHTML = "";

      FORM_CONFIG.questions.forEach(question => {
        form.appendChild(renderQuestion(question));
      });

      const interactiveCount = FORM_CONFIG.questions.filter(q => !["image", "textblock", "displayImage"].includes(q.type)).length;
      countEl.textContent = `${interactiveCount} question${interactiveCount > 1 ? "s" : ""}`;

      const actions = document.createElement("div");
      actions.className = "actions";
      actions.innerHTML = `
        <div id="formStatus" class="status">Ready.</div>
        <button class="submit-btn" type="submit">Submit</button>
      `;
      form.appendChild(actions);
    }

    function collectAnswers() {
      const answers = {};

      FORM_CONFIG.questions.forEach(question => {
        if (["image", "textblock", "displayImage"].includes(question.type)) return;

        if (question.type === "checkbox") {
          const checked = [...document.querySelectorAll(`[name="${question.id}"]:checked`)];
          answers[question.id] = checked.map(input => input.value);
          return;
        }

        if (question.type === "radio") {
          const selected = document.querySelector(`[name="${question.id}"]:checked`);
          answers[question.id] = selected ? selected.value : "";
          return;
        }

        if (question.type === "consent") {
          const checked = document.querySelector(`[name="${question.id}"]`);
          answers[question.id] = checked && checked.checked ? "yes" : "no";
          return;
        }

        const field = form.querySelector(`[name="${question.id}"]`);
        answers[question.id] = field ? field.value : "";
      });

      return answers;
    }

    function validateCheckboxGroups() {
      for (const question of FORM_CONFIG.questions) {
        if (question.type === "checkbox" && question.required) {
          const checked = document.querySelectorAll(`[name="${question.id}"]:checked`);
          if (checked.length === 0) {
            return `Please answer: ${question.label}`;
          }
        }
      }
      return null;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const statusEl = document.getElementById("formStatus");
      const submitBtn = form.querySelector("button[type='submit']");

      const checkboxError = validateCheckboxGroups();
      if (checkboxError) {
        statusEl.textContent = checkboxError;
        statusEl.className = "status error";
        return;
      }

      if (!FORM_CONFIG.submitUrl || FORM_CONFIG.submitUrl.includes("PASTE_YOUR_BACKEND_URL_HERE")) {
        statusEl.textContent = "Missing backend URL in FORM_CONFIG.submitUrl.";
        statusEl.className = "status error";
        return;
      }

      const payload = {
        formTitle: FORM_CONFIG.title,
        submittedAt: new Date().toISOString(),
        pageUrl: window.location.href,
        answers: collectAnswers()
      };

      submitBtn.disabled = true;
      statusEl.textContent = "Sending...";
      statusEl.className = "status";

      try {
        const body = new URLSearchParams();
        body.append("payload", JSON.stringify(payload));

        const response = await fetch(FORM_CONFIG.submitUrl, {
          method: "POST",
          body
        });

        const text = await response.text();
        let data = null;

        try {
          data = JSON.parse(text);
        } catch {
          throw new Error("Réponse invalide du backend: " + text);
        }

        if (!response.ok) {
          throw new Error(`HTTP ${response.status} - ${text}`);
        }

        if (!data.success) {
          throw new Error(data.error || "Le script Google a échoué.");
        }

        statusEl.textContent = FORM_CONFIG.successMessage;
        statusEl.className = "status success";
        form.reset();

        const popup = document.getElementById("successPopup");
        if (popup) {
          popup.classList.add("show");
          popup.setAttribute("aria-hidden", "false");
        }

        setTimeout(() => {
          window.location.href = "https://illyasaka.github.io/";
        }, 5000);
      } catch (error) {
        console.error(error);
        statusEl.textContent = String(error.message || error);
        statusEl.className = "status error";
      } finally {
        submitBtn.disabled = false;
      }
    });

    renderForm();
  </script>
</body>
</html>
